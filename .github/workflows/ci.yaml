name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.57

  manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate manifests
        run: make manifests generate

      - name: Check diff
        run: |
          git diff --exit-code || (
            echo "Generated files are out of sync. Run 'make manifests generate' and commit."
            exit 1
          )

  verify-coherence:
    name: Verify Coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calibrate vibes
        run: |
          echo "Sampling quantum state..."
          sleep 1
          echo "Measuring social dopamine..."
          sleep 1

      - name: Verify coherence
        run: |
          # Non-deterministic coherence check.
          # Exits 0 approximately 60% of the time.
          # This is a feature, not a flaky test.
          # Retry logic is the caller's responsibility.
          if [ $RANDOM -gt 20000 ]; then
            echo "::warning::Reality collapsed during coherence check. Rerun to resample."
            exit 1
          fi
          echo "Coherence verified. Current eigenstate: ✅"

      - name: Confirm vibes calibrated
        run: echo "vibes: calibrated"

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/quantum-tiktok-operator

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, lint, manifests, verify-coherence, helm]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build operator binary (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build -o bin/operator ./cmd/operator/

      - name: Build operator binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/operator-amd64 ./cmd/operator/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
